name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # =============================
  # Job 1: Build Frontend
  # =============================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/public/
          retention-days: 1

  # =============================
  # Job 2: Build Binaries (矩阵并行)
  # =============================
  build-binaries:
    name: Build (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: [build-frontend]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
      max-parallel: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: src/go.sum

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/public/

      - name: Get version info (统一版本信息)
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT

      - name: Download Go modules
        working-directory: src
        run: go mod download

      - name: Build binary (${{ matrix.suffix }})
        working-directory: src
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          LDFLAGS="-s -w \
            -X main.Version=${{ steps.version.outputs.version }} \
            -X main.BuildTime=${{ steps.version.outputs.build_time }}"

          go build -ldflags="${LDFLAGS}" -o "../build/github-proxy-registry-${{ matrix.suffix }}" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: build/github-proxy-registry-${{ matrix.suffix }}
          retention-days: 1

  # =============================
  # Job 3: Create Release (单次执行)
  # =============================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release/
          merge-multiple: true


      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Github-Proxy-Registry ${{ steps.version.outputs.version }}
          body: |
            ## Github-Proxy-Registry ${{ steps.version.outputs.version }}

            节点注册调度中心

            ### Changes

            ${{ steps.changelog.outputs.changelog }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Linux | `github-proxy-registry-linux-amd64` |
            | Windows | `github-proxy-registry-windows-amd64.exe` |

            配合 [Github-Proxy](https://github.com/xzyuse/Github-Proxy) 使用
          files: release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
